name: Deploy Static Files to EC2

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show repository structure
        run: |
          pwd
          ls -al
          ls -al my-web-test || true

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify AWS identity
        run: |
          aws sts get-caller-identity

      - name: Upload files to S3
        run: |
          aws s3 sync "${{ vars.LOCAL_SOURCE_DIR }}" "${{ secrets.S3_URI }}" --delete

      - name: Run deploy script on EC2 via SSM
        run: |
          aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy web test files" \
            --parameters 'commands=["/home/ubuntu/deploy_web.sh"]' \
            --region "${{ secrets.AWS_REGION }}"